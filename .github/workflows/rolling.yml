name: Rolling Release
on:
  push:
    branches: [ master ]

  # Allows you to run this workflow manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: rolling-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_rolling:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [ 3.11 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Run Build Pipeline
        uses: ./.github/actions/build-app

      - name: Sign Windows executable
        if: runner.os == 'Windows'
        uses: ./.github/actions/sign-windows
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_WINDOWS_ARTIFACT_CONFIGURATION_SLUG }}
          artifact-path: zxlive_windows.exe
          require-valid-signature: "false"

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries-${{ matrix.os }}
          path: zxlive_*
          if-no-files-found: error

  publish_rolling:
    needs: build_rolling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update Rolling Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f rolling
          git push origin -f rolling

      - name: Download release artifacts only
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-binaries-*
          path: release_assets
          merge-multiple: true

      - name: Show release assets
        run: ls -la release_assets

      - name: Publish rolling release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: rolling
          prerelease: true
          files: release_assets/*
